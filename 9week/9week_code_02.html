<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World - 학습 예제</title>

  <!--
    ════════════════════════════════════════════════
    Google Fonts 불러오기
    ════════════════════════════════════════════════
    인터넷에 공개된 무료 글꼴을 <link> 태그로 불러올 수 있습니다.
    아래 URL을 바꾸면 다른 글꼴을 사용할 수 있습니다.
    구글 폰트 사이트: https://fonts.google.com
    
    사용 중인 글꼴:
    - Noto Sans KR : 한글 본문
    - Nunito        : 영문 제목 (둥글둥글한 느낌)
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Nunito:wght@300;700;900&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════════
       CSS 변수 (Custom Properties)
       ════════════════════════════════════════════════
       --변수명: 값; 으로 정의하고 var(--변수명) 으로 사용합니다.
       색상이나 크기를 한 곳에서 모아서 관리할 수 있어
       테마를 바꿀 때 여기만 수정하면 됩니다.
    */
    :root {
      /* :root = 문서 최상위, 여기에 변수를 선언하면 어디서든 쓸 수 있습니다 */
      --bg-color:       #f0f4f8;
      --card-bg:        #ffffff;
      --text-primary:   #2d3748;
      --text-secondary: #718096;
      --accent:         #667eea;     /* 강조 색상 (보라-파랑) */
      --accent-dark:    #5a67d8;
      --box-bg:         #eef2ff;
      --box-border:     #c3dafe;
      --shadow:         0 8px 32px rgba(102, 126, 234, 0.15);
    }

    /* 다크모드일 때 변수를 덮어씁니다
       body에 class="dark" 가 추가되면 이 값들이 적용됩니다 */
    body.dark {
      --bg-color:       #1a202c;
      --card-bg:        #2d3748;
      --text-primary:   #f7fafc;
      --text-secondary: #a0aec0;
      --accent:         #7f9cf5;
      --accent-dark:    #667eea;
      --box-bg:         #2d3748;
      --box-border:     #4a5568;
      --shadow:         0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* ── 전체 페이지 ── */
    * {
      /* * 는 모든 요소에 적용됩니다 */
      box-sizing: border-box; /* padding이 너비에 포함되도록 설정 */
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans KR', Arial, sans-serif;
      background-color: var(--bg-color);    /* CSS 변수 사용 */
      color: var(--text-primary);
      display: flex;
      flex-direction: column;               /* 세로 방향으로 쌓기 */
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* transition : 값이 바뀔 때 부드럽게 전환됩니다 (다크모드 전환 시 활용) */
      transition: background-color 0.4s, color 0.4s;
    }

    /* ── 다크모드 토글 버튼 (우측 상단 고정) ── */
    #dark-toggle {
      position: fixed;       /* 스크롤해도 항상 같은 위치에 고정 */
      top: 16px;
      right: 20px;
      background: var(--card-bg);
      border: 2px solid var(--box-border);
      border-radius: 50px;   /* 완전히 둥근 모양 */
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.3s;
      box-shadow: var(--shadow);
      z-index: 100;          /* 다른 요소보다 앞에 표시 */
    }

    #dark-toggle:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ── 카드 ── */
    .card {
      background-color: var(--card-bg);
      border-radius: 20px;
      padding: 52px 64px;
      text-align: center;
      box-shadow: var(--shadow);
      width: 420px;
      transition: background-color 0.4s, box-shadow 0.4s;
    }

    /* ════════════════════════════════════════════════
       CSS 애니메이션 (@keyframes)
       ════════════════════════════════════════════════
       @keyframes 이름 { from { ... } to { ... } }
       요소가 처음 나타날 때 아래에서 올라오는 효과를 줍니다.
    */
    @keyframes fadeInUp {
      from {
        opacity: 0;              /* 투명하게 시작 */
        transform: translateY(20px); /* 20px 아래에서 시작 */
      }
      to {
        opacity: 1;              /* 완전히 보이게 */
        transform: translateY(0); /* 원래 위치로 */
      }
    }

    /* 타이핑 커서 깜빡임 애니메이션 */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── 제목 ── */
    h1 {
      font-family: 'Nunito', sans-serif; /* 제목만 다른 글꼴 사용 */
      font-size: 52px;
      font-weight: 900;
      /* 그라데이션 텍스트 만들기 */
      background: linear-gradient(135deg, var(--accent), #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      /* 애니메이션 적용: 이름 지속시간 가속도 */
      animation: fadeInUp 0.6s ease-out;
    }

    /* ── 타이핑 커서 (|) ── */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      border-radius: 2px;
      animation: blink 1s infinite; /* 1초마다 깜빡임 반복 */
    }

    /* ── 인사말 ── */
    .greeting {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
      /* 0.1s 딜레이: 제목이 나타난 직후 보입니다 */
    }

    /* 시간대별 인사말 강조 */
    .greeting .time-of-day {
      color: var(--accent);
      font-weight: 700;
    }

    /* ── 구분선 ── */
    hr {
      border: none;
      border-top: 1px solid var(--box-border);
      margin: 0 0 28px;
      transition: border-color 0.4s;
    }

    /* ── 시간 박스 ── */
    .time-box {
      background-color: var(--box-bg);
      border: 2px solid var(--box-border);
      border-radius: 14px;
      padding: 24px 32px;
      margin-bottom: 20px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
      transition: background-color 0.4s, border-color 0.4s;
    }

    .box-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    /* 시:분:초 큰 숫자 */
    #clock {
      font-family: 'Nunito', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* 날짜 */
    #date {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 10px;
    }

    /* ── 하단 버튼 행 ── */
    .btn-row {
      display: flex;
      gap: 10px;               /* 버튼 사이 간격 */
      justify-content: center;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }

    /* 버튼 공통 스타일 */
    .btn {
      padding: 10px 20px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      border: 2px solid var(--accent);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* 채워진 버튼 */
    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      transform: translateY(-2px); /* 위로 살짝 올라가는 효과 */
    }

    /* 테두리만 있는 버튼 */
    .btn-outline {
      background: transparent;
      color: var(--accent);
    }

    .btn-outline:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-2px);
    }

    /* ── 복사 완료 토스트 메시지 ── */
    /*
      position: fixed + opacity 로 화면 위에 잠깐 떴다 사라지는
      알림 메시지(토스트)를 만들 수 있습니다.
    */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%); /* 정확히 가운데 정렬 */
      background: #2d3748;
      color: white;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 14px;
      opacity: 0;               /* 평소에는 보이지 않음 */
      transition: opacity 0.3s;
      pointer-events: none;     /* 보이지 않을 때 클릭 영역 제거 */
      z-index: 200;
    }

    /* .show 클래스가 추가되면 보이게 됩니다 */
    #toast.show { opacity: 1; }
  </style>
</head>

<body>

  <!-- 다크모드 토글 버튼 -->
  <button id="dark-toggle" onclick="toggleDark()">🌙 다크모드</button>

  <div class="card">

    <!-- 제목 + 깜빡이는 커서 -->
    <h1>Hello, World!<span class="cursor"></span></h1>

    <!--
      시간대별 인사말
      JavaScript가 현재 시각을 보고 텍스트를 바꿔줍니다.
    -->
    <p class="greeting" id="greeting">안녕하세요!</p>

    <hr>

    <!-- 시간 박스 -->
    <div class="time-box">
      <div class="box-label">현재 시각</div>
      <div id="clock">00:00:00</div>
      <div id="date">날짜 로딩 중...</div>
    </div>

    <!-- 버튼 행 -->
    <div class="btn-row">
      <!--
        onclick="함수명()" 으로 클릭 시 실행할 함수를 연결합니다.
      -->
      <button class="btn btn-primary"  onclick="copyTime()">⏱ 시간 복사</button>
      <button class="btn btn-outline"  onclick="copyDate()">📅 날짜 복사</button>
    </div>

  </div>

  <!-- 토스트 알림 (복사 완료 메시지) -->
  <div id="toast">✅ 클립보드에 복사되었습니다!</div>

  <script>
    /* ════════════════════════════════════════════════
       공통 데이터
    ════════════════════════════════════════════════ */

    const DAYS = ['일', '월', '화', '수', '목', '금', '토'];

    /* ════════════════════════════════════════════════
       시계 & 진행률 업데이트
    ════════════════════════════════════════════════ */

    function updateClock() {
      const now = new Date();

      /* ── 시간 표시 ── */
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

      /* ── 날짜 표시 ── */
      const year    = now.getFullYear();
      const month   = now.getMonth() + 1;
      const day     = now.getDate();
      const weekday = DAYS[now.getDay()];
      document.getElementById('date').textContent =
        `${year}년 ${month}월 ${day}일 (${weekday}요일)`;

      /* ── 시간대별 인사말 ── */
      /*
        if / else if / else : 조건에 따라 다른 코드를 실행합니다.
        시(hour)를 기준으로 아침/오전/오후/저녁/밤으로 나눕니다.
      */
      const hour = now.getHours();
      let   timeOfDay;

      if (hour >= 5 && hour < 9) {
        timeOfDay = '아침';
      } else if (hour >= 9 && hour < 12) {
        timeOfDay = '오전';
      } else if (hour >= 12 && hour < 18) {
        timeOfDay = '오후';
      } else if (hour >= 18 && hour < 22) {
        timeOfDay = '저녁';
      } else {
        timeOfDay = '밤';
      }

      /*
        innerHTML 을 사용하면 HTML 태그를 포함한 텍스트를 넣을 수 있습니다.
        textContent 는 태그 없이 순수 텍스트만 넣을 때 사용합니다.
      */
      document.getElementById('greeting').innerHTML =
        `좋은 <span class="time-of-day">${timeOfDay}</span>이에요 😊`;

    }

    // 즉시 실행 + 1초마다 반복
    updateClock();
    setInterval(updateClock, 1000);

    /* ════════════════════════════════════════════════
       다크모드 토글
    ════════════════════════════════════════════════ */

    /*
      classList.toggle('dark') :
      body에 'dark' 클래스가 없으면 추가하고,
      이미 있으면 제거합니다. (On/Off 전환)
    */
    function toggleDark() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      document.getElementById('dark-toggle').textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
    }

    /* ════════════════════════════════════════════════
       클립보드 복사 기능
    ════════════════════════════════════════════════ */

    /*
      navigator.clipboard.writeText(텍스트)
      현재 클립보드에 텍스트를 복사합니다.
      (Ctrl+C 와 같은 효과)
    */
    async function copyTime() {
      const text = document.getElementById('clock').textContent;
      await navigator.clipboard.writeText(text);
      showToast();
    }

    async function copyDate() {
      const text = document.getElementById('date').textContent;
      await navigator.clipboard.writeText(text);
      showToast();
    }

    /* ── 토스트 메시지 표시 ── */
    /*
      setTimeout(함수, 밀리초) :
      지정한 시간 후에 함수를 한 번만 실행합니다.
      (setInterval은 계속 반복, setTimeout은 한 번만)
    */
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');           // 토스트를 보이게 합니다
      setTimeout(() => {
        toast.classList.remove('show');      // 2초 후 숨깁니다
      }, 2000);
      // () => { ... } 는 화살표 함수(Arrow Function) 입니다
      // function() { ... } 와 같은 의미지만 더 짧게 쓸 수 있습니다
    }
  </script>

</body>
</html>
