<!DOCTYPE html>
<html>

<head>
    <title>Hello World</title>
</head>

<body>

    <h1>Hello World</h1>

    <p id="time"></p>

    <script>
        let now = new Date();

        document.getElementById("time").innerHTML =
            "현재 시각 : " + now.toLocaleTimeString();
    </script>

</body>

</html>
