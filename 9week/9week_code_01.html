<!DOCTYPE html>
<html>

<head>
    <title>Hello World</title>

    <script>

        window.onload = function () {

            let clock = document.getElementById("clock");

            setInterval(function () {

                let now = new Date();

                clock.innerHTML =
                    "Hello World<br>" + now.toString();

            }, 1000);

        };

    </script>

</head>

<body>

    <h1 id="clock"></h1>

</body>

</html>v
